<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel DJ - El Profe Alex</title>
    <style>
        /* Paleta de colores unificada */
        :root {
            --bg-color: #000000;
            --card-bg: #050505;
            --magenta-glow: rgba(168, 85, 247, 0.4);
            --input-bg: #0f0f0f;
            --input-border: #222222;
            --text-main: #ffffff;
            --text-muted: #aaaaaa;
        }

        /* Fondo general con iluminación ambiental */
        body {
            background: 
                radial-gradient(circle at 15% 50%, rgba(139, 0, 0, 0.25), transparent 50%),
                radial-gradient(circle at 85% 50%, rgba(0, 0, 139, 0.25), transparent 50%),
                var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            box-sizing: border-box;
        }

        /* Tarjeta principal estilo app móvil */
        .main-card {
            background: var(--card-bg);
            border: 1px solid #1a1a1a;
            border-radius: 16px;
            box-shadow: 0 0 30px var(--magenta-glow);
            width: 100%;
            max-width: 500px;
            padding: 30px 25px;
            box-sizing: border-box;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo-container img {
            max-width: 90%;
            height: auto;
            display: inline-block;
        }

        h2, h3 {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
            margin-top: 0;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        .input-control {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            color: var(--text-main);
            padding: 14px;
            border-radius: 6px;
            font-size: 15px;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 20px;
        }

        /* Estructura base para botones planos y centrados al 100% de ancho */
        .btn-flat {
            width: 100%;
            background: transparent;
            border: 2px solid var(--text-main);
            color: var(--text-main);
            padding: 14px;
            border-radius: 6px;
            font-weight: bold;
            font-size: 13px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 15px;
            box-sizing: border-box;
            text-align: center;
        }

        /* Aspecto secundario (Estilo compacto para Limpiar Lista, Activo y Pausado) */
        .btn-secondary { 
            border: 2px solid #52525b; 
            color: #a1a1aa; 
            font-size: 11px; 
            padding: 10px; 
        }
        .btn-secondary:hover { background: #52525b; color: #fff; }

        /* Variación del botón de estado: Activo (Verde con la misma estructura compacta) */
        .btn-status-active { 
            border: 2px solid #22c55e; 
            color: #22c55e; 
            font-size: 11px; 
            padding: 10px; 
        }
        .btn-status-active:hover { background: #22c55e; color: #000; }
        
        /* Variación del botón de estado: Pausado (Rojo con la misma estructura compacta) */
        .btn-status-inactive { 
            border: 2px solid #ef4444; 
            color: #ef4444; 
            font-size: 11px; 
            padding: 10px; 
        }
        .btn-status-inactive:hover { background: #ef4444; color: #000; }

        /* 🔵 Nuevo botón de refrescar en color Azul */
        .btn-blue {
            background: transparent;
            border: 2px solid #3b82f6;
            color: #60a5fa;
            font-size: 11px;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .btn-blue:hover {
            background: #3b82f6;
            color: #ffffff;
        }

        /* Lista y tarjetas de canciones */
        .lista-peticiones { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .tarjeta-cancion {
            background: #0a0a0a;
            border: 1px solid var(--input-border);
            border-radius: 8px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 15px;
        }
        .info-cancion h4 { margin: 0 0 5px 0; font-size: 15px; color: #ffffff; }
        .info-cancion p { margin: 2px 0; color: var(--text-muted); font-size: 13px; }
        .info-cancion .saludo { color: #a855f7; font-style: italic; font-size: 12px; margin-top: 6px; }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid #ef4444;
            color: #ef4444;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: bold;
        }
        .btn-delete:hover { background: #ef4444; color: white; }

        .flex-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="main-card">
        
        <!-- 🔐 SECCIÓN 1: PANTALLA DE ACCESO PIN (Contiene el logo para que desaparezca al entrar) -->
        <div id="pantallaLogin">
            <div class="logo-container">
                <img src="sonido_profealex_logo.png" alt="Logo Sonido El Profe Alex">
            </div>
            <h2>ACCESO PRIVADO DJ</h2>
            <input type="password" id="inputPin" class="input-control" placeholder="ESCRIBE EL PIN" maxlength="8">
            <button id="btnEntrar" class="btn-flat">INGRESAR AL PANEL</button>
        </div>

        <!-- 🎧 SECCIÓN 2: PANTALLA PRINCIPAL DEL DJ (Limpia sin logo) -->
        <div id="pantallaPanel" style="display: none;">
            
            <div class="flex-header">
                <span style="font-size: 12px; letter-spacing: 1px; color: var(--text-muted);">PANEL DE CONTROL</span>
                <button id="btnCerrarSesion" class="btn-delete" style="border-radius: 4px; width: auto; height: auto; padding: 4px 8px; font-size: 11px;">SALIR</button>
            </div>

            <!-- Botón de Estado del Evento (Centrado, idéntico al de limpiar pero muta entre rojo/verde) -->
            <button id="btnSwitchEvento" class="btn-flat btn-status-inactive">CARGANDO ESTADO...</button>
            
            <!-- Botón de Limpiar Lista (Centrado al 100% de ancho) -->
            <button id="btnLimpiarTodo" class="btn-flat btn-secondary">🧹 LIMPIAR LISTA COMPLETADA</button>

            <div class="flex-header" style="margin-top: 30px; border-bottom: 1px solid #1a1a1a;">
                <span style="font-size: 13px; letter-spacing: 1px; font-weight: bold;">FILA DE PETICIONES</span>
                <!-- 🔵 Botón Actualizar Azul -->
                <button id="btnActualizar" class="btn-blue">🔄 REFRESCAR</button>
            </div>
            
            <div id="contenedorPeticiones" class="lista-peticiones">
                <p style="color: #444; text-align: center; font-size: 13px;">Cargando peticiones...</p>
            </div>

        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="admin.js"></script>
</body>
</html>
